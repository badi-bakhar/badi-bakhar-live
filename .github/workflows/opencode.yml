name: opencode
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  opencode:
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-south-1
          AWS_PROFILE: ""
          AWS_DEFAULT_REGION: ap-south-1
        with:
          model: amazon-bedrock/global.anthropic.claude-sonnet-4-5-20250929-v1:0
          prompt: |
            You are the Badi Bakhar AI agent — a personal knowledge OS assistant.
            Read AGENTS.md first. Then handle the request following the workflows defined there.
            For scheduled or manual runs: list all files in OS/data/, count notes per subdirectory,
            check inbox/ for any unprocessed items (excluding inbox/opencode), and reply with
            a brief system status report. Never delete files. Never modify inbox/opencode.
